version: '3.8'

services:

  mongodb:
    image: mongo
    container_name: mongodb
    ports:
      - "27017:27017"

  server:
    build: ./server
    container_name: main-server
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
      - storage1
      - storage2
      - storage3

  storage1:
    build: ./storage-server-1
    container_name: storage1
    ports:
      - "5001:5001"

  storage2:
    build: ./storage-server-2
    container_name: storage2
    ports:
      - "5002:5002"

  storage3:
    build: ./storage-server-3
    container_name: storage3
    ports:
      - "5003:5003"

  client:
    build: ./client
    container_name: frontend
    ports:
      - "3000:3000"
    depends_on:
      - server