name: Distributed Storage DevOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Server Dependencies
        run: |
          cd server
          npm install

      - name: Docker Compose Validation
        run: docker compose config